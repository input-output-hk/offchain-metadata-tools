name: CI

on:
  pull_request:
  push:
    branches: [master]

# Least privilege by default; only the docs-publishing job below opts up to
# contents: write.
permissions:
  contents: read

# Supersede in-flight runs for the same ref on pull requests, but never
# interrupt a master run mid gh-pages publish.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  LC_ALL: en_US.UTF-8

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Nix
        uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31.11.0
        with:
            extra_nix_config: |
              trusted-public-keys = hydra.iohk.io:f/Ea+s+dFdN+3Y/G+FDgSq+a5NEWhJGzdjvKNGv0/EQ= cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=
              substituters = https://cache.iog.io https://cache.nixos.org/
              experimental-features = nix-command flakes
              accept-flake-config = true

      - name: Build executables and run tests
        run: |
          nix build --accept-flake-config \
            .#metadata-server \
            .#metadata-sync \
            .#metadata-validator-github \
            .#metadata-webhook \
            .#token-metadata-creator
          nix build --accept-flake-config -L \
            '.#checks.x86_64-linux."metadata-lib:test:unit-tests"' \
            '.#checks.x86_64-linux."token-metadata-creator:test:golden-tests"'

  update-docs:
    if: github.ref == 'refs/heads/master'
    name: Update docs
    runs-on: ubuntu-latest
    # Needs write access to push the generated site to the gh-pages branch.
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Nix
        uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31.11.0
        with:
            extra_nix_config: |
              trusted-public-keys = hydra.iohk.io:f/Ea+s+dFdN+3Y/G+FDgSq+a5NEWhJGzdjvKNGv0/EQ= cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=
              substituters = https://cache.iog.io https://cache.nixos.org/
              experimental-features = nix-command flakes
              accept-flake-config = true

      - name: Run update-docs
        run: |
          nix build --accept-flake-config .#update-docs -o update-docs.sh
          ./update-docs.sh

  check-stylish-haskell:
    name: Check Stylish Haskell
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Nix
        uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31.11.0
        with:
            extra_nix_config: |
              trusted-public-keys = hydra.iohk.io:f/Ea+s+dFdN+3Y/G+FDgSq+a5NEWhJGzdjvKNGv0/EQ= cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=
              substituters = https://cache.iog.io https://cache.nixos.org/
              experimental-features = nix-command flakes
              accept-flake-config = true

      - name: Run stylish-haskell check
        run: nix develop --accept-flake-config -c .github/check-stylish.sh
